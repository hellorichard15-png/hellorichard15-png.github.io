<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>母亲节幸运抽红包</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffd6e0, #ffb6c1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .box {
            background: #fff;
            border-radius: 25px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(255, 105, 180, 0.3);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #e84a8a;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .flower {
            font-size: 50px;
            margin: 20px 0;
        }

        #result {
            font-size: 20px;
            color: #c71585;
            min-height: 60px;
            margin: 15px 0;
            padding: 15px;
            border-radius: 15px;
            background: #ffe6f2;
            line-height: 1.6;
        }

        .count-tip {
            color: #e84a8a;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(90deg, #ff69b4, #ff87b5);
            color: #fff;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
            transition: all 0.3s ease;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.5);
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>💐 母亲节幸运抽奖</h1>
        <div class="flower">🌷💖🌷</div>
        <div class="count-tip" id="countTip">今日剩余次数：15 次</div>
        <div id="result">点击下方按钮开启好运～</div>
        <button class="btn" id="drawBtn" onclick="drawLottery()">立即抽好运</button>
    </div>

    <script>
        // 配置
        const MAX_TIMES = 15; // 每天最多15次
        const moneyList = [5.20, 6.66, 8.88, 9.99, 13.14, 20.00];
        const blessList = [
            "母亲节快乐，愿妈妈永远健康美丽～",
            "岁岁年年，愿妈妈平安喜乐❤️",
            "感恩母爱，一生温柔相伴🌷",
            "愿时光慢一点，爱妈妈久一点",
            "最美的祝福送给最爱的妈妈"
        ];

        // 获取今天日期字符串 YYYY-MM-DD
        function getTodayStr() {
            const d = new Date();
            return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
        }

        // 初始化次数
        function initCount() {
            let today = getTodayStr();
            let store = JSON.parse(localStorage.getItem('momDraw')) || {};

            // 不是同一天，重置次数
            if (store.date !== today) {
                store = { date: today, times: 0 };
                localStorage.setItem('momDraw', JSON.stringify(store));
            }
            return store.times;
        }

        // 更新剩余次数显示
        function updateTip() {
            let times = initCount();
            let left = MAX_TIMES - times;
            document.getElementById('countTip').innerText = `今日剩余次数：${left} 次`;
            // 次数用完禁用按钮
            if (left <= 0) {
                document.getElementById('drawBtn').disabled = true;
                document.getElementById('result').innerText = "今日抽奖次数已用完，明天再来哦～";
            }
        }

        // 抽奖逻辑
        function drawLottery() {
            let times = initCount();
            if (times >= MAX_TIMES) {
                document.getElementById('result').innerText = "今日抽奖次数已用完，明天再来哦～";
                return;
            }

            // 次数+1 保存缓存
            times++;
            let store = { date: getTodayStr(), times: times };
            localStorage.setItem('momDraw', JSON.stringify(store));
            updateTip();

            // 50%概率抽钱/祝福语
            let isGetMoney = Math.random() < 0.5;
            let resDom = document.getElementById("result");

            if (isGetMoney) {
                let randomMoney = moneyList[Math.floor(Math.random() * moneyList.length)];
                resDom.innerHTML = `🎉 恭喜抽中红包<br>💰 ${randomMoney.toFixed(2)} 元`;
            } else {
                let randomBless = blessList[Math.floor(Math.random() * blessList.length)];
                resDom.innerText = randomBless;
            }
        }

        // 页面加载初始化
        window.onload = function() {
            updateTip();
        };
    </script>
</body>
</html>
